# vim:set ft=tmux:
## name: Oasis Rose Dark
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#df93b1"
set -ogq @thm_primary "#e6a4be"
set -ogq @thm_light_primary "#ecb5cb"
set -ogq @thm_secondary "#93c795"
set -ogq @thm_prefix "#8fd1c7"
set -ogq @thm_fg "#fadbe4"

# Surfaces and overlays
set -ogq @thm_core "#2c1724"
set -ogq @thm_mantle "#3c2534"
set -ogq @thm_surface "#4e3747"
set -ogq @thm_visual "#666666"

# General
set -ogq @thm_red "#ff7979"
set -ogq @thm_orange "#f8b471"
set -ogq @thm_yellow "#f0e68c"
set -ogq @thm_green "#7fcf78"
set -ogq @thm_teal "#8fd1c7"
set -ogq @thm_blue "#81c0ff"
set -ogq @thm_indigo "#c695ff"
