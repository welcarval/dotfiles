# vim:set ft=tmux:
## name: Oasis Dune Dark
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#bdb76b"
set -ogq @thm_primary "#d6ce7c"
set -ogq @thm_light_primary "#f6eeb2"
set -ogq @thm_secondary "#8fd1c7"
set -ogq @thm_prefix "#d2adff"
