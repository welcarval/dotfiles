# vim:set ft=tmux:
## name: Oasis Lagoon Dark
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#1ca0fd"
set -ogq @thm_primary "#58b8fd"
set -ogq @thm_light_primary "#94d0fe"
set -ogq @thm_secondary "#f8b471"
set -ogq @thm_prefix "#ffa0a0"
set -ogq @thm_fg "#d9e6fa"

# Surfaces and overlays
set -ogq @thm_core "#101825"
set -ogq @thm_mantle "#1a283f"
set -ogq @thm_surface "#22385c"
set -ogq @thm_visual "#666666"

# General
set -ogq @thm_red "#ff7979"
set -ogq @thm_orange "#f8b471"
set -ogq @thm_yellow "#f0e68c"
set -ogq @thm_green "#7fcf78"
set -ogq @thm_teal "#8fd1c7"
set -ogq @thm_blue "#81c0ff"
set -ogq @thm_indigo "#c695ff"
