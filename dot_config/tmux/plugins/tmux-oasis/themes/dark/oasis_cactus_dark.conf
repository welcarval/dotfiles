# vim:set ft=tmux:
## name: Oasis Cactus Dark
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#7fbb82"
set -ogq @thm_primary "#7fbb82"
set -ogq @thm_light_primary "#a7d3a9"
set -ogq @thm_secondary "#d2adff"
set -ogq @thm_prefix "#ffa0a0"
set -ogq @thm_fg "#ddf0e5"

# Surfaces and overlays
set -ogq @thm_core "#151e17"
set -ogq @thm_mantle "#212c22"
set -ogq @thm_surface "#2f3d33"
set -ogq @thm_visual "#666666"

# General
set -ogq @thm_red "#ff7979"
set -ogq @thm_orange "#f8b471"
set -ogq @thm_yellow "#f0e68c"
set -ogq @thm_green "#7fcf78"
set -ogq @thm_teal "#8fd1c7"
set -ogq @thm_blue "#81c0ff"
set -ogq @thm_indigo "#c695ff"
