# vim:set ft=tmux:
## name: Oasis Twilight Dark
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#e28e6f"
set -ogq @thm_primary "#f7997d"
set -ogq @thm_light_primary "#fbc0aa"
set -ogq @thm_secondary "#d2adff"
set -ogq @thm_prefix "#f0e68c"
set -ogq @thm_fg "#f0e4f2"

# Surfaces and overlays
set -ogq @thm_core "#1b1320"
set -ogq @thm_mantle "#261a32"
set -ogq @thm_surface "#362343"
set -ogq @thm_visual "#666666"

# General
set -ogq @thm_red "#ff7979"
set -ogq @thm_orange "#f8b471"
set -ogq @thm_yellow "#f0e68c"
set -ogq @thm_green "#7fcf78"
set -ogq @thm_teal "#8fd1c7"
set -ogq @thm_blue "#81c0ff"
set -ogq @thm_indigo "#c695ff"
