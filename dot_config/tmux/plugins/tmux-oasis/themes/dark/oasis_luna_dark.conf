# vim:set ft=tmux:
## name: Oasis Luna Dark
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#bdb76b"
set -ogq @thm_primary "#f0e68c"
set -ogq @thm_light_primary "#f3ea9f"
set -ogq @thm_secondary "#9797e9"
set -ogq @thm_prefix "#6dceeb"
set -ogq @thm_fg "#eeeafe"

# Surfaces and overlays
set -ogq @thm_core "#0d0d2b"
set -ogq @thm_mantle "#17143e"
set -ogq @thm_surface "#211d4e"
set -ogq @thm_visual "#666666"

# General
set -ogq @thm_red "#ff7979"
set -ogq @thm_orange "#f8b471"
set -ogq @thm_yellow "#f0e68c"
set -ogq @thm_green "#7fcf78"
set -ogq @thm_teal "#8fd1c7"
set -ogq @thm_blue "#81c0ff"
set -ogq @thm_indigo "#c695ff"
