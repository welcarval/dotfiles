# vim:set ft=tmux:
## name: Oasis Scorpion Dark
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#cdc673"
set -ogq @thm_primary "#f0e68c"
set -ogq @thm_light_primary "#f3ea9f"
set -ogq @thm_secondary "#f7997d"
set -ogq @thm_prefix "#7fcf78"
