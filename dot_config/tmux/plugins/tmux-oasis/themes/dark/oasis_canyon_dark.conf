# vim:set ft=tmux:
## name: Oasis Canyon Dark
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#ffa34d"
set -ogq @thm_primary "#ffba75"
set -ogq @thm_light_primary "#f9c97b"
set -ogq @thm_secondary "#94d0fe"
set -ogq @thm_prefix "#ff9090"
set -ogq @thm_fg "#f8e7d3"

# Surfaces and overlays
set -ogq @thm_core "#261612"
set -ogq @thm_mantle "#35231d"
set -ogq @thm_surface "#483228"
set -ogq @thm_visual "#666666"

# General
set -ogq @thm_red "#ff7979"
set -ogq @thm_orange "#f8b471"
set -ogq @thm_yellow "#f0e68c"
set -ogq @thm_green "#7fcf78"
set -ogq @thm_teal "#8fd1c7"
set -ogq @thm_blue "#81c0ff"
set -ogq @thm_indigo "#c695ff"
