# vim:set ft=tmux:
## name: Oasis Moonlight Dark
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#5d8bbb"
set -ogq @thm_primary "#7fa3c9"
set -ogq @thm_light_primary "#b0c8de"
set -ogq @thm_secondary "#f0e68c"
set -ogq @thm_prefix "#ffa0a0"
set -ogq @thm_fg "#f7f4f2"

# Surfaces and overlays
set -ogq @thm_core "#070c13"
set -ogq @thm_mantle "#0f1520"
set -ogq @thm_surface "#1a2330"
set -ogq @thm_visual "#666666"

# General
set -ogq @thm_red "#ff7979"
set -ogq @thm_orange "#f8b471"
set -ogq @thm_yellow "#f0e68c"
set -ogq @thm_green "#7fcf78"
set -ogq @thm_teal "#8fd1c7"
set -ogq @thm_blue "#81c0ff"
set -ogq @thm_indigo "#c695ff"
