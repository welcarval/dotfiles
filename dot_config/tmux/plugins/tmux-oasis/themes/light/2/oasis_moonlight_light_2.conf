# General
set -ogq @thm_red "#b41212"
set -ogq @thm_orange "#854c13"
set -ogq @thm_yellow "#615b21"
set -ogq @thm_green "#396435"
set -ogq @thm_teal "#32625b"
set -ogq @thm_blue "#145ba2"
set -ogq @thm_indigo "#7724d9"
