# vim:set ft=tmux:
## name: Oasis Night Light 2
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#3c6188"
set -ogq @thm_primary "#28405a"
set -ogq @thm_light_primary "#253d53"
set -ogq @thm_secondary "#706712"
set -ogq @thm_prefix "#a30505"
set -ogq @thm_fg "#0c131d"

# Surfaces and overlays
set -ogq @thm_core "#e4edf7"
set -ogq @thm_mantle "#d2e2f1"
set -ogq @thm_surface "#b4cfe9"
set -ogq @thm_visual "#e1b69d"

# General
set -ogq @thm_red "#b51212"
set -ogq @thm_orange "#854d14"
set -ogq @thm_yellow "#625c21"
set -ogq @thm_green "#396435"
set -ogq @thm_teal "#32635b"
set -ogq @thm_blue "#145ba3"
set -ogq @thm_indigo "#7824da"
