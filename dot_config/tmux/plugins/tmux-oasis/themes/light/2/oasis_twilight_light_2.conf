# vim:set ft=tmux:
## name: Oasis Twilight Light 2
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#a04625"
set -ogq @thm_primary "#77240b"
set -ogq @thm_light_primary "#6f2509"
set -ogq @thm_secondary "#3b047e"
set -ogq @thm_prefix "#918517"
