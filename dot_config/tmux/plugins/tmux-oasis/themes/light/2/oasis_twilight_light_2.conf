# General
set -ogq @thm_red "#b61212"
set -ogq @thm_orange "#864d14"
set -ogq @thm_yellow "#625c21"
set -ogq @thm_green "#396536"
set -ogq @thm_teal "#32635c"
set -ogq @thm_blue "#145ca4"
set -ogq @thm_indigo "#7824db"
