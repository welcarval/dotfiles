# vim:set ft=tmux:
## name: Oasis Desert Light 2
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#86803f"
set -ogq @thm_primary "#706712"
set -ogq @thm_light_primary "#685e10"
set -ogq @thm_secondary "#7e0404"
set -ogq @thm_prefix "#357a2f"
set -ogq @thm_fg "#1a1610"

# Surfaces and overlays
set -ogq @thm_core "#f6f2db"
set -ogq @thm_mantle "#f1ebc9"
set -ogq @thm_surface "#eae0aa"
set -ogq @thm_visual "#e1c99d"

# General
set -ogq @thm_red "#bb1313"
set -ogq @thm_orange "#8a4f14"
set -ogq @thm_yellow "#655f22"
set -ogq @thm_green "#3b6837"
set -ogq @thm_teal "#34665f"
set -ogq @thm_blue "#155ea9"
set -ogq @thm_indigo "#7c2adc"
