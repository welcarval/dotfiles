# vim:set ft=tmux:
## name: Oasis Starlight Light 5
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#135f93"
set -ogq @thm_primary "#013a62"
set -ogq @thm_light_primary "#0d3a4c"
set -ogq @thm_secondary "#58500b"
set -ogq @thm_prefix "#8a0000"
set -ogq @thm_fg "#181611"

# Surfaces and overlays
set -ogq @thm_core "#ebe5d5"
set -ogq @thm_mantle "#e4dbc5"
set -ogq @thm_surface "#d7cbac"
set -ogq @thm_visual "#dacfa4"

# General
set -ogq @thm_red "#ae1111"
set -ogq @thm_orange "#804913"
set -ogq @thm_yellow "#5e581f"
set -ogq @thm_green "#366033"
set -ogq @thm_teal "#305f57"
set -ogq @thm_blue "#13579b"
set -ogq @thm_indigo "#7322d1"
