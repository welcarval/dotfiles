# vim:set ft=tmux:
## name: Oasis Lagoon Light 5
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#135f93"
set -ogq @thm_primary "#013a62"
set -ogq @thm_light_primary "#013258"
set -ogq @thm_secondary "#5f3105"
set -ogq @thm_prefix "#8a0000"
set -ogq @thm_fg "#0e131b"

# Surfaces and overlays
set -ogq @thm_core "#c1daf6"
