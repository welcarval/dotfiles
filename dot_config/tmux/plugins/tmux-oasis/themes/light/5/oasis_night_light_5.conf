# vim:set ft=tmux:
## name: Oasis Night Light 5
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#315275"
set -ogq @thm_primary "#1e3146"
set -ogq @thm_light_primary "#1a2d3f"
set -ogq @thm_secondary "#58500b"
set -ogq @thm_prefix "#8a0000"
set -ogq @thm_fg "#0c131d"

# Surfaces and overlays
set -ogq @thm_core "#b7d5f0"
set -ogq @thm_mantle "#a4caec"
set -ogq @thm_surface "#84b7e6"
set -ogq @thm_visual "#e1b69d"

# General
set -ogq @thm_red "#960f0f"
set -ogq @thm_orange "#6e3f10"
set -ogq @thm_yellow "#504b1b"
set -ogq @thm_green "#2f522b"
set -ogq @thm_teal "#29514b"
set -ogq @thm_blue "#104b86"
set -ogq @thm_indigo "#631db5"
