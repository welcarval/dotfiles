# vim:set ft=tmux:
## name: Oasis Rose Light 5
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#802649"
set -ogq @thm_primary "#4e152c"
set -ogq @thm_light_primary "#471227"
set -ogq @thm_secondary "#224123"
set -ogq @thm_prefix "#286259"
set -ogq @thm_fg "#1a0f12"

# Surfaces and overlays
set -ogq @thm_core "#ecbedb"
