# vim:set ft=tmux:
## name: Oasis Desert Light 5
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#736e33"
set -ogq @thm_primary "#58500b"
set -ogq @thm_light_primary "#4f480a"
set -ogq @thm_secondary "#630000"
set -ogq @thm_prefix "#296624"
set -ogq @thm_fg "#191510"

# Surfaces and overlays
set -ogq @thm_core "#ede4b7"
set -ogq @thm_mantle "#e8dda5"
set -ogq @thm_surface "#e1d286"
set -ogq @thm_visual "#e1c99d"

# General
set -ogq @thm_red "#ab1111"
set -ogq @thm_orange "#7e4812"
set -ogq @thm_yellow "#5c561f"
set -ogq @thm_green "#365f32"
set -ogq @thm_teal "#2f5d56"
set -ogq @thm_blue "#135699"
set -ogq @thm_indigo "#7122ce"
