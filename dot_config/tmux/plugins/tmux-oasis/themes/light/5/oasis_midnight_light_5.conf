# vim:set ft=tmux:
## name: Oasis Midnight Light 5
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#736e33"
set -ogq @thm_primary "#4c4718"
set -ogq @thm_light_primary "#4f480a"
set -ogq @thm_secondary "#630000"
set -ogq @thm_prefix "#296624"
