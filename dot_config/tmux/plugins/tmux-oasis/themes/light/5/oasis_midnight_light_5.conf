set -ogq @thm_surface "#a0acc5"
set -ogq @thm_visual "#e1c99d"

# General
set -ogq @thm_red "#910e0e"
set -ogq @thm_orange "#6a3c0f"
set -ogq @thm_yellow "#4d481a"
set -ogq @thm_green "#2d4f2a"
set -ogq @thm_teal "#284e48"
set -ogq @thm_blue "#104880"
set -ogq @thm_indigo "#601cae"
