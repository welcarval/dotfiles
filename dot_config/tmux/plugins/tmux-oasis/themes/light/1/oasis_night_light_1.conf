# vim:set ft=tmux:
## name: Oasis Night Light 1
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#40668e"
set -ogq @thm_primary "#2c4560"
set -ogq @thm_light_primary "#28425a"
set -ogq @thm_secondary "#786e14"
set -ogq @thm_prefix "#ab0707"
set -ogq @thm_fg "#111a28"

# Surfaces and overlays
set -ogq @thm_core "#f3f5f7"
set -ogq @thm_mantle "#e5e9ee"
set -ogq @thm_surface "#ced6de"
set -ogq @thm_visual "#e1b69d"

# General
set -ogq @thm_red "#bf1313"
set -ogq @thm_orange "#8d5115"
set -ogq @thm_yellow "#686123"
set -ogq @thm_green "#3c6a38"
set -ogq @thm_teal "#356860"
set -ogq @thm_blue "#1560ac"
set -ogq @thm_indigo "#7e2ddd"
