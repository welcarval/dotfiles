# vim:set ft=tmux:
## name: Oasis Rose Light 1
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#9b345c"
set -ogq @thm_primary "#6b213e"
set -ogq @thm_light_primary "#641e3a"
set -ogq @thm_secondary "#325b33"
