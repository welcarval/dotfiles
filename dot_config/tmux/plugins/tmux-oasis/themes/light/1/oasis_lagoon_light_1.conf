# vim:set ft=tmux:
## name: Oasis Lagoon Light 1
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#1e75b1"
set -ogq @thm_primary "#075085"
set -ogq @thm_light_primary "#06497c"
set -ogq @thm_secondary "#81460c"
set -ogq @thm_prefix "#ab0707"
set -ogq @thm_fg "#141b26"

# Surfaces and overlays
set -ogq @thm_core "#f2f7fd"
set -ogq @thm_mantle "#deebfa"
set -ogq @thm_surface "#bdd6f5"
set -ogq @thm_visual "#9fcae0"

# General
set -ogq @thm_red "#c01313"
set -ogq @thm_orange "#8e5215"
set -ogq @thm_yellow "#696223"
set -ogq @thm_green "#3d6b39"
set -ogq @thm_teal "#356961"
set -ogq @thm_blue "#1561ae"
set -ogq @thm_indigo "#7f2fde"
