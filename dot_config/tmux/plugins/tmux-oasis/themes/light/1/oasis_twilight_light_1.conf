# vim:set ft=tmux:
## name: Oasis Twilight Light 1
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#a64a28"
set -ogq @thm_primary "#7f270d"
set -ogq @thm_light_primary "#77280b"
set -ogq @thm_secondary "#400687"
set -ogq @thm_prefix "#988c1a"
set -ogq @thm_fg "#1e181f"

# Surfaces and overlays
set -ogq @thm_core "#f8f4fb"
set -ogq @thm_mantle "#ede3f5"
set -ogq @thm_surface "#dbc7eb"
set -ogq @thm_visual "#e1b69d"

# General
set -ogq @thm_red "#c01313"
set -ogq @thm_orange "#8d5115"
set -ogq @thm_yellow "#686123"
set -ogq @thm_green "#3c6a38"
set -ogq @thm_teal "#356960"
set -ogq @thm_blue "#1561ad"
set -ogq @thm_indigo "#7e2edd"
