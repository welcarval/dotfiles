# General
set -ogq @thm_red "#bc1313"
set -ogq @thm_orange "#8a4f15"
set -ogq @thm_yellow "#665f22"
set -ogq @thm_green "#3b6837"
set -ogq @thm_teal "#34675f"
set -ogq @thm_blue "#155fa9"
set -ogq @thm_indigo "#7c2add"
