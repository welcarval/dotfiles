# vim:set ft=tmux:
## name: Oasis Moonlight Light 4
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#35577b"
set -ogq @thm_primary "#21364d"
set -ogq @thm_light_primary "#1e3346"
set -ogq @thm_secondary "#60580d"
set -ogq @thm_prefix "#920101"
set -ogq @thm_fg "#171412"

# Surfaces and overlays
set -ogq @thm_core "#e2dfce"
set -ogq @thm_mantle "#d9d6c0"
set -ogq @thm_surface "#cbc6a8"
set -ogq @thm_visual "#e1b69d"

# General
set -ogq @thm_red "#a61111"
set -ogq @thm_orange "#7a4612"
set -ogq @thm_yellow "#5a541e"
set -ogq @thm_green "#345c31"
set -ogq @thm_teal "#2e5a53"
set -ogq @thm_blue "#125394"
set -ogq @thm_indigo "#6e21c7"
