# vim:set ft=tmux:
## name: Oasis Rose Light 4
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#87294e"
set -ogq @thm_primary "#551830"
set -ogq @thm_light_primary "#4f152c"
set -ogq @thm_secondary "#264827"
set -ogq @thm_prefix "#2c685f"
