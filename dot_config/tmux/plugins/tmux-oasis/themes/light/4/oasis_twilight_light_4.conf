# vim:set ft=tmux:
## name: Oasis Twilight Light 4
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#913e1f"
set -ogq @thm_primary "#661d07"
set -ogq @thm_light_primary "#5e1d05"
set -ogq @thm_secondary "#32016d"
set -ogq @thm_prefix "#827712"
set -ogq @thm_fg "#161217"

# Surfaces and overlays
set -ogq @thm_core "#e3d4f0"
set -ogq @thm_mantle "#d8c3ea"
set -ogq @thm_surface "#c5a7e0"
set -ogq @thm_visual "#e1b69d"

# General
set -ogq @thm_red "#a01010"
set -ogq @thm_orange "#764311"
set -ogq @thm_yellow "#56511d"
set -ogq @thm_green "#32582f"
set -ogq @thm_teal "#2c5750"
set -ogq @thm_blue "#11508f"
set -ogq @thm_indigo "#6a20c0"
