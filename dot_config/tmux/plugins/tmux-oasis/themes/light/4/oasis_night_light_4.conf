# vim:set ft=tmux:
## name: Oasis Night Light 4
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#35577b"
set -ogq @thm_primary "#21364d"
set -ogq @thm_light_primary "#1e3346"
set -ogq @thm_secondary "#60580d"
set -ogq @thm_prefix "#920101"
set -ogq @thm_fg "#0c131c"

# Surfaces and overlays
set -ogq @thm_core "#c1daf6"
set -ogq @thm_mantle "#adcef3"
set -ogq @thm_surface "#8cbbee"
set -ogq @thm_visual "#e1b69d"

# General
set -ogq @thm_red "#9d1010"
set -ogq @thm_orange "#734211"
set -ogq @thm_yellow "#554f1c"
set -ogq @thm_green "#31572e"
set -ogq @thm_teal "#2b554f"
set -ogq @thm_blue "#114f8c"
set -ogq @thm_indigo "#681fbd"
