# vim:set ft=tmux:
## name: Oasis Night Light 3
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#395c82"
set -ogq @thm_primary "#253b53"
set -ogq @thm_light_primary "#21384c"
set -ogq @thm_secondary "#685f10"
set -ogq @thm_prefix "#9b0303"
set -ogq @thm_fg "#0c131d"

# Surfaces and overlays
set -ogq @thm_core "#d1e2f5"
set -ogq @thm_mantle "#bed6f1"
set -ogq @thm_surface "#9ec2eb"
set -ogq @thm_visual "#e1b69d"

# General
set -ogq @thm_red "#a81111"
set -ogq @thm_orange "#7b4613"
set -ogq @thm_yellow "#5b551e"
set -ogq @thm_green "#355d31"
set -ogq @thm_teal "#2e5b55"
set -ogq @thm_blue "#125496"
set -ogq @thm_indigo "#6f21ca"
