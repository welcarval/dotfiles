# vim:set ft=tmux:
## name: Oasis Moonlight Light 3
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#395c82"
set -ogq @thm_primary "#253b53"
set -ogq @thm_light_primary "#21384c"
set -ogq @thm_secondary "#685f10"
set -ogq @thm_prefix "#9b0303"
set -ogq @thm_fg "#161412"

# Surfaces and overlays
set -ogq @thm_core "#e8e5d8"
set -ogq @thm_mantle "#dfdbca"
set -ogq @thm_surface "#d1cbb2"
set -ogq @thm_visual "#e1b69d"

# General
set -ogq @thm_red "#ad1111"
set -ogq @thm_orange "#7f4913"
set -ogq @thm_yellow "#5e571f"
set -ogq @thm_green "#366032"
set -ogq @thm_teal "#305e57"
set -ogq @thm_blue "#13579b"
set -ogq @thm_indigo "#7322d1"
