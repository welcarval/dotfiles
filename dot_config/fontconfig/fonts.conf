<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <match target="scan">
    <test name="family"><string>Font Awesome 7 Free</string></test>
    <edit name="charset" mode="assign">
      <minus>
        <name>charset</name>
        <charset>
          <int>0x1F34F</int>
          <int>0x1F34E</int>
        </charset>
      </minus>
    </edit>
  </match>
</fontconfig>
